<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0e1a" />
    <title>Pyodide Agent Runtime — Browser-Native AI</title>
    <meta
      name="description"
      content="A lightweight, browser-native AI agent runtime executing Python directly in WebAssembly via Pyodide."
    />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><circle cx='32' cy='32' r='28' fill='%2300e5ff' opacity='.15'/><circle cx='32' cy='32' r='10' fill='%2300e5ff'/></svg>" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <!--
      Pyodide is a real npm dependency. Its assets are copied from
      node_modules/pyodide into public/pyodide/ at install time
      (see scripts/copy-pyodide.mjs). We load the IIFE build here so
      Vite serves it as a static asset rather than trying to bundle
      the ES-module wrapper, which would hit the public/-import wall.
    -->
    <script src="/pyodide/pyodide.js"></script>
  </head>
  <body class="bg-canvas text-slate-100 font-display antialiased min-h-screen">
    <div id="app" class="min-h-screen flex flex-col"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
